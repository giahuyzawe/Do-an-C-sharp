<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cập nhật POIs - Food Tour</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container { max-width: 800px; margin-top: 50px; }
        .poi-item { border: 1px solid #ddd; padding: 10px; margin: 5px 0; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4">⚙️ Cập nhật POIs</h1>
        <p class="text-muted">Thêm <code>radius</code> và <code>priority</code> cho tất cả nhà hàng</p>
        
        <div class="card mb-4">
            <div class="card-body">
                <h5>Default Values:</h5>
                <ul>
                    <li><strong>Radius:</strong> 100 (mét) - Phạm vi geofence</li>
                    <li><strong>Priority:</strong> 1-3 - Độ ưu tiên hiển thị (3 = cao nhất)</li>
                </ul>
                <button class="btn btn-primary" onclick="updateAll()">
                    <i class="bi bi-arrow-repeat"></i> Cập nhật tất cả POIs
                </button>
            </div>
        </div>
        
        <div id="result"></div>
    </div>
    
    <script>
        const POIS_FILE = 'data/pois.json';
        
        async function updateAll() {
            try {
                // Load POIs
                const response = await fetch(POIS_FILE);
                let pois = await response.json();
                
                let updated = 0;
                pois.forEach((poi, index) => {
                    // Add radius if not set
                    if (!poi.radius || poi.radius <= 0) {
                        poi.radius = 100;
                    }
                    
                    // Add priority if not set (alternate 1, 2, 3)
                    if (!poi.priority || poi.priority <= 0) {
                        poi.priority = (index % 3) + 1;  // 1, 2, 3, 1, 2, 3...
                    }
                    
                    updated++;
                });
                
                // Show result
                document.getElementById('result').innerHTML = `
                    <div class="alert alert-success">
                        <h5>✅ Đã cập nhật ${updated} POIs!</h5>
                        <p>Vui lòng <strong>lưu file JSON</strong> sau:</p>
                        <pre class="bg-light p-3" style="max-height: 300px; overflow: auto;">${JSON.stringify(pois, null, 2)}</pre>
                        <button class="btn btn-success" onclick="downloadJSON()">
                            <i class="bi bi-download"></i> Tải xuống pois.json
                        </button>
                    </div>
                `;
                
                window.updatedPois = pois;
                
            } catch (e) {
                document.getElementById('result').innerHTML = `
                    <div class="alert alert-danger">Lỗi: ${e.message}</div>
                `;
            }
        }
        
        function downloadJSON() {
            const dataStr = JSON.stringify(window.updatedPois, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'pois.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
